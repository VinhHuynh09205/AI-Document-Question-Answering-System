services:
  aichatbox-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aichatbox-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      API_V1_PREFIX: /api/v1
      DATABASE_BACKEND: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: aichatbox
      MYSQL_USER: aichatbox
      MYSQL_PASSWORD: aichatbox
      MYSQL_CHARSET: utf8mb4
      VECTOR_STORE_PATH: /app/data/faiss_index
      VECTOR_BACKUP_DIR: /app/data/faiss_backups
      UPLOAD_DIR: /app/data/uploads
      USERS_FILE_PATH: /app/data/users.json
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.4
    container_name: aichatbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aichatbox
      MYSQL_USER: aichatbox
      MYSQL_PASSWORD: aichatbox
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  adminer:
    image: adminer:4
    container_name: aichatbox-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
