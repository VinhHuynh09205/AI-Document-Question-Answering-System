services:
  aichatbox-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_LOCAL_SEMANTIC_EMBEDDINGS: ${LOCAL_SEMANTIC_EMBEDDINGS:-false}
    container_name: aichatbox-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      API_V1_PREFIX: /api/v1
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: aichatbox
      PG_USER: aichatbox
      PG_PASSWORD: aichatbox
      VECTOR_STORE_PATH: /app/data/faiss_index
      VECTOR_BACKUP_DIR: /app/data/faiss_backups
      UPLOAD_DIR: /app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: aichatbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aichatbox
      POSTGRES_USER: aichatbox
      POSTGRES_PASSWORD: aichatbox
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aichatbox -d aichatbox"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
