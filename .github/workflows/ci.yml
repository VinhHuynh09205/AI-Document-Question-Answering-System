name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API server
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not start in time"
          cat uvicorn.log || true
          exit 1

      - name: Run smoke test
        run: python scripts/smoke_test.py --base-url http://127.0.0.1:8000

  docker-build:
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aichatbox:ci .
